<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>时光佳酿</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI,Arial;
scroll-behavior:smooth;
}

body{
background:#03050c;
color:white;
overflow-x:hidden;
}

/* 星空背景 */

#space{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:-2;
}

#grid{
position:fixed;
width:100%;
height:100%;
background:
linear-gradient(#0ff1 1px, transparent 1px),
linear-gradient(90deg,#0ff1 1px,transparent 1px);
background-size:40px 40px;
opacity:0.05;
z-index:-1;
}

/* 顶部 */

header{
text-align:center;
padding:140px 20px;
}

h1{
font-size:70px;
color:#00f7ff;
text-shadow:
0 0 10px #00f7ff,
0 0 40px #00f7ff,
0 0 80px #00f7ff;
letter-spacing:6px;
}

.typing{
margin-top:20px;
font-size:20px;
color:#9aa4c3;
height:24px;
}

/* 导航 */

nav{
margin-top:50px;
}

nav a{
color:#00f7ff;
text-decoration:none;
margin:0 20px;
font-size:18px;
position:relative;
}

nav a:after{
content:"";
position:absolute;
width:0;
height:2px;
background:#00f7ff;
left:0;
bottom:-6px;
transition:.3s;
}

nav a:hover:after{
width:100%;
}

/* 布局 */

.container{
max-width:1100px;
margin:auto;
padding:40px;
}

section{
margin:120px 0;
}

/* 标题 */

.section-title{
font-size:34px;
margin-bottom:40px;
color:#00f7ff;
}

/* 卡片 */

.card{
background:rgba(255,255,255,0.05);
backdrop-filter:blur(12px);
border:1px solid rgba(0,255,255,0.2);
border-radius:18px;
padding:30px;
margin-bottom:30px;
transition:0.5s;
transform-style:preserve-3d;
}

.card:hover{
transform:
rotateX(5deg)
rotateY(-5deg)
translateY(-10px)
scale(1.03);
box-shadow:0 0 40px rgba(0,255,255,0.4);
}

/* 项目 */

.project-title{
font-size:24px;
color:#00f7ff;
margin-bottom:10px;
}

.tag{
display:inline-block;
border:1px solid #00f7ff88;
padding:6px 14px;
border-radius:20px;
margin:6px;
font-size:12px;
}

/* 关于 */

.about{
font-size:18px;
line-height:1.8;
}

/* footer */

footer{
text-align:center;
padding:50px;
border-top:1px solid #1c2445;
color:#8a93b8;
}

/* 动画 */

.fade{
opacity:0;
transform:translateY(60px);
transition:1s;
}

.fade.show{
opacity:1;
transform:translateY(0);
}

/* 手机 */

@media(max-width:700px){

h1{
font-size:42px;
}

.container{
padding:20px;
}

}

</style>

</head>

<body>

<canvas id="space"></canvas>
<div id="grid"></div>

<header>

<h1>时光佳酿</h1>

<div class="typing" id="typing"></div>

<nav>
<a href=" ">博客</a >
<a href="#projects">项目</a >
<a href="#about">关于</a >
</nav>

</header>

<div class="container">

<section id="blog" class="fade">

<h2 class="section-title">博客</h2>

<div class="card">
<h3>AI 编程学习路线</h3>
<p>从 Python 到大模型开发的一条完整学习路径。</p >
</div>

<div class="card">
<h3>程序员如何培养产品思维</h3>
<p>技术能力 + 用户思维，才能做出真正有价值的软件。</p >
</div>

<div class="card">
<h3>开发效率提升指南</h3>
<p>分享我常用的开发工具和效率方法。</p >
</div>

</section>

<section id="projects" class="fade">

<h2 class="section-title">项目</h2>

<div class="card">

<div class="project-title">Task Manager App</div>

<p>一个简单任务管理工具，用于规划每日任务与提高效率。</p >

<div>
<span class="tag">Productivity</span>
<span class="tag">Task</span>
<span class="tag">App</span>
</div>

</div>

</section>

<section id="about" class="fade">

<h2 class="section-title">关于</h2>

<div class="card about">

<p>欢迎来到 <b>时光佳酿</b>。</p >

<p>这里记录我在 <b>编程、AI、技术教程和产品思考</b> 方面的探索。</p >

<p>技术不仅是工具，而是创造未来的一种方式。</p >

</div>

</section>

</div>

<footer>
© 2026 时光佳酿
</footer>

<script>

/* 星空粒子 */

const canvas=document.getElementById("space")
const ctx=canvas.getContext("2d")

canvas.width=window.innerWidth
canvas.height=window.innerHeight

let stars=[]

for(let i=0;i<160;i++){
stars.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
r:Math.random()*1.5,
speed:Math.random()*0.4
})
}

function animate(){

ctx.clearRect(0,0,canvas.width,canvas.height)

stars.forEach(s=>{

ctx.beginPath()
ctx.arc(s.x,s.y,s.r,0,Math.PI*2)
ctx.fillStyle="#00f7ff"
ctx.fill()

s.y+=s.speed

if(s.y>canvas.height){
s.y=0
s.x=Math.random()*canvas.width
}

})

requestAnimationFrame(animate)

}

animate()

/* 打字机 */

const text="编程 · AI · 技术教程 · 产品思考"
let i=0

function typing(){

if(i<text.length){
document.getElementById("typing").innerHTML+=text.charAt(i)
i++
setTimeout(typing,80)
}

}

typing()

/* 滚动动画 */

const observer=new IntersectionObserver(entries=>{
entries.forEach(e=>{
if(e.isIntersecting){
e.target.classList.add("show")
}
})
})

document.querySelectorAll(".fade").forEach(el=>{
observer.observe(el)
})

</script>

</body>
</html>
